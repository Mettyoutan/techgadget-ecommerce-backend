spring:
  jpa:
    show-sql: true # Show sql for development

logging:
  level:
    root: debug
    org.springframework: debug

management:
  tracing:
    # Sample 100% of requests. In production, lower this (e.g. 0.1 = 10%)
    # to avoid performance overhead from tracing every single request.
    sampling:
      probability: 1.0