logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate.SQL: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    # Sample 100% of requests. In production, lower this (e.g. 0.1 = 10%)
    # to avoid performance overhead from tracing every single request.
    sampling:
      probability: 1.0